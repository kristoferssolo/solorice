#:schema https://github.com/joshmedeski/sesh/raw/main/sesh.schema.json
[default_session]
startup_command = "tmux new-window && tmux select-window -t 1 && clear"
preview_command = "eza -a --icons --git --group-directories-first --color=always {}"

[[session]]
name = "dotfiles"
path = "~/Nextcloud/repos/dotfiles/"
startup_command = "tmux new-window && tmux select-window -t 1 && nvim ."

[[session]]
name = "SoloVim"
path = "~/Nextcloud/repos/SoloVim/"
startup_command = "tmux new-window && tmux select-window -t 1 && nvim ."

[[wildcard]]
pattern = "~/repos/**"

[[wildcard]]
pattern = "~/Nextcloud/repos/**"

[[wildcard]]
pattern = "~/Nextcloud/Documents/Typst/*"
startup_command = "typst-watch && clear && nvim main.typ"

[[window]]
name = "empty"

[[window]]
name = "code"
startup_command = "nvim ."

[[window]]
name = "lazygit"
startup_command = "lazygit"

[[window]]
name = "gh-dash"
startup_command = "gh-dash"

[[window]]
name = "typst"
startup_command = "mkdir -p target && typst watch main.typ target/main.pdf"
